<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DM Trading House — Quotation System</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f2f5;color:#222;font-size:14px}
.header{background:#1a2744;color:#fff;padding:14px 20px;display:flex;align-items:center;gap:14px}
.header h1{font-size:18px;font-weight:600}
.header p{font-size:11px;opacity:.7;margin-top:2px}
.logo{width:44px;height:44px;background:#c8a951;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:16px;color:#1a2744;flex-shrink:0}
.container{max-width:960px;margin:0 auto;padding:16px}
.card{background:#fff;border-radius:10px;padding:16px 18px;margin-bottom:14px;border:1px solid #e0e4ea}
.card-title{font-size:13px;font-weight:600;color:#1a2744;text-transform:uppercase;letter-spacing:.04em;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.card-title::before{content:'';width:3px;height:14px;background:#c8a951;border-radius:2px;display:inline-block}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.form-grid.full{grid-template-columns:1fr}
.form-group label{display:block;font-size:12px;color:#666;margin-bottom:3px}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 10px;border:1px solid #d0d5dd;border-radius:6px;font-size:13px;color:#222;background:#fff;outline:none;transition:border .15s}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#1a2744}
.form-group textarea{min-height:56px;resize:vertical}
.cat-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px}
.cat-tab{font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid #d0d5dd;cursor:pointer;background:#fff;color:#555;transition:all .15s;white-space:nowrap}
.cat-tab:hover{border-color:#1a2744;color:#1a2744}
.cat-tab.active{background:#1a2744;color:#fff;border-color:#1a2744}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px;max-height:380px;overflow-y:auto;padding-right:4px}
.prod-card{border:1px solid #e0e4ea;border-radius:8px;padding:8px;cursor:pointer;transition:all .15s;background:#fff;display:flex;flex-direction:column;align-items:center;text-align:center}
.prod-card:hover{border-color:#c8a951;background:#fffdf5}
.prod-card.selected{border-color:#1a2744;border-width:2px;background:#f0f3fa}
.prod-img{width:80px;height:80px;object-fit:contain;border-radius:6px;margin-bottom:6px;background:#f8f8f8;}
.prod-code{font-size:11px;font-weight:700;color:#c8a951;margin-bottom:2px}
.prod-name{font-size:12px;font-weight:500;color:#1a2744;margin-bottom:2px;line-height:1.4;text-align:center}
.prod-meta{font-size:11px;color:#888}
.prod-inputs{margin-top:8px;display:grid;grid-template-columns:1fr;gap:6px;width:100%}
.prod-inputs label{font-size:11px;color:#666;display:block;margin-bottom:2px}
.prod-inputs input{width:100%;padding:4px 7px;border:1px solid #d0d5dd;border-radius:5px;font-size:12px}
.quote-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#1a2744;color:#fff;padding:8px 10px;text-align:left;font-weight:500;font-size:12px}
td{padding:8px 10px;border-bottom:1px solid #f0f2f5;color:#333;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#fafbfc}
.remove-btn{background:none;border:none;color:#bbb;cursor:pointer;font-size:18px;line-height:1;padding:0 4px}
.remove-btn:hover{color:#e53935}
.total-row{display:flex;justify-content:flex-end;align-items:baseline;gap:10px;margin-top:10px;padding-top:10px;border-top:1px solid #e0e4ea}
.total-label{font-size:13px;color:#666}
.total-amount{font-size:22px;font-weight:700;color:#1a2744}
.empty-msg{text-align:center;color:#aaa;padding:24px;font-size:13px}
.btn-submit{width:100%;padding:12px;background:#1a2744;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;letter-spacing:.02em;transition:background .15s}
.btn-submit:hover{background:#253660}
.btn-submit:disabled{opacity:.5;cursor:not-allowed}
.status{padding:10px 14px;border-radius:8px;font-size:13px;margin-top:10px;display:none}
.status.success{background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7;display:block}
.status.error{background:#ffebee;color:#c62828;border:1px solid #ef9a9a;display:block}
.quote-no-badge{display:inline-block;background:#fff8e6;border:1px solid #c8a951;color:#7a5c00;border-radius:6px;padding:3px 10px;font-size:12px;font-weight:600;margin-left:auto}
@media(max-width:600px){.form-grid{grid-template-columns:1fr}.prod-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<div class="header">
  <div class="logo">DM</div>
  <div>
    <h1>DM Trading House</h1>
    <p>Safety & Industrial Equipment Supplier &middot; Raddolugama &middot; +94 71-582-1370</p>
  </div>
</div>

<div class="container">

  <div class="card">
    <div class="card-title">Customer Information
      <span class="quote-no-badge" id="qno-display">QT-------</span>
    </div>
    <div class="form-grid">
      <div class="form-group"><label>Customer Name *</label><input type="text" id="cust-name" placeholder="Enter full name"></div>
      <div class="form-group"><label>Company Name</label><input type="text" id="cust-company" placeholder="Company / Organization name"></div>
      <div class="form-group"><label>Address</label><input type="text" id="cust-addr" placeholder="Delivery address"></div>
      <div class="form-group"><label>Phone</label><input type="text" id="cust-phone" placeholder="+94 XX XXX XXXX"></div>
      <div class="form-group"><label>Email</label><input type="email" id="cust-email" placeholder="customer@example.com"></div>
      <div class="form-group"><label>Date *</label><input type="date" id="quote-date"></div>
      <div class="form-group"><label>Note</label><textarea id="note" placeholder="Special instructions or remarks..."></textarea></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Select Products</div>
    <div class="cat-tabs" id="cat-tabs"></div>
    <div class="prod-grid" id="prod-grid"></div>
  </div>

  <div class="card">
    <div class="card-title">Quotation Summary</div>
    <div class="quote-wrap">
      <div id="quote-body"><div class="empty-msg">Click on product cards to add items</div></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Submit to Google Sheets</div>
    <button class="btn-submit" id="submit-btn" onclick="submitQuote()">&#9729; Submit Quotation</button>
    <div class="status" id="status-msg"></div>
  
  <div class="card" style="margin-bottom:0">
    <div class="card-title">Print Quotation</div>
    <button class="btn-submit" style="background:#c8a951;color:#1a2744" onclick="printQuotation()">&#128438; Print / Save as PDF</button>
  </div>
</div>

</div>

<script>
const WEBHOOK_URL = "https://script.google.com/macros/s/AKfycbwHtbOCnlmOf3vUDSjm78YnqznkeiNTdi6R-qrVP6W_Mj1Hdlu--aryV0OK1p8FYMaJdA/exec";

const PRODUCTS = [
  {cat:"Cotton Gloves",code:"CG1",name:"Cotton Knitted Glove (Gray)",color:"Gray",size:"Free Size",material:"Cotton & Polyester"},
  {cat:"Cotton Gloves",code:"CG2",name:"Cotton Knitted Glove (White)",color:"White",size:"Free Size",material:"Cotton & Polyester"},
  {cat:"Dotted Gloves",code:"DG1",name:"Single Side Dotted Glove",color:"White",size:"Free Size",material:"Cotton/Polyester/PVC"},
  {cat:"Dotted Gloves",code:"DG2",name:"Double Side Dotted Glove",color:"White",size:"Free Size",material:"Cotton/Polyester/PVC"},
  {cat:"Dotted Gloves",code:"DG3",name:"Dotted Nylon Glove (Ladies Fit)",color:"Black",size:"Free Size",material:"Nylon"},
  {cat:"Nylon Gloves",code:"NG1",name:"Knitted Nylon Glove (Seamless)",color:"White/Black/Gray",size:"Free Size",material:"Nylon"},
  {cat:"Rubber/Latex Coated",code:"RCG1",name:"Rubber Coated Cotton Glove",color:"Black/Gray",size:"Large (10)",material:"Polyester/Cotton"},
  {cat:"Rubber/Latex Coated",code:"RCG2",name:"Rubber Coated Terry Glove",color:"Orange & Black",size:"Free Size",material:"Terry"},
  {cat:"Rubber/Latex Coated",code:"RCG3",name:"Rubber Coated Nylon Glove (Latex Palm)",color:"Black/Gray",size:"Free Size",material:"Nylon"},
  {cat:"Rubber/Latex Coated",code:"RCG4",name:"Cotton Latex Coated Glove",color:"White & Orange",size:"Free Size",material:"Polyester/Cotton"},
  {cat:"Rubber/Latex Coated",code:"RCG5",name:"Foam Coated Glove (Nitrile Foam)",color:"Black",size:"Free Size",material:"Nylon"},
  {cat:"Nitrile & PVC",code:"NCG1",name:"Nitrile Coated Glove with Cuff",color:"Blue/Black/Green",size:"M/L",material:"Jersey Cotton + Canvas Cuff"},
  {cat:"Nitrile & PVC",code:"NCG2",name:"Nitrile Knit Wrist Coated Glove",color:"Blue/Black/Green",size:"M/L",material:"Jersey Cotton + Knit Wrist"},
  {cat:"Nitrile & PVC",code:"NCG3",name:"PVC Double Dipped Glove",color:"Blue/Black/Green",size:"M/L",material:"Jersey Cotton + PVC"},
  {cat:"Nitrile & PVC",code:"NCG4",name:"Green Nitrile Chemical Resistant Glove",color:"Green",size:"M/L/XL",material:"Nitrile & Latex"},
  {cat:"Cut Resistant",code:"CRG1",name:"Cut Resistant Glove",color:"Gray/Black",size:"M/L/XL",material:"Super Strong Fiber"},
  {cat:"Cut Resistant",code:"CRG2",name:"Cut Resistant Palm Coated Glove (PU)",color:"Gray/Black",size:"M/L/XL",material:"Super Strong Fiber + PU"},
  {cat:"Cut Resistant",code:"CRG3",name:"Stainless Steel Mesh Glove (Chainmail)",color:"Silver",size:"M/L",material:"Stainless Steel"},
  {cat:"Rubber & Household",code:"HRG1",name:"Household Rubber Glove",color:"Yellow/Green/Blue/Pink",size:"S/M/L",material:"Rubber/Latex"},
  {cat:"Rubber & Household",code:"HRG2",name:"Heavy Rubber Glove",color:"Black",size:"S/M/L",material:"Rubber"},
  {cat:"Rubber & Household",code:"HRG3",name:"Long Sleeve Rubber Glove",color:"Red",size:"S/M/L",material:"Rubber"},
  {cat:"Disposable Gloves",code:"DPG1",name:"Latex Disposable Glove",color:"Natural/White",size:"S/M/L/XL",material:"Latex"},
  {cat:"Disposable Gloves",code:"DPG2",name:"Nitrile Disposable Glove",color:"Blue",size:"S/M/L/XL",material:"Nitrile"},
  {cat:"Disposable Gloves",code:"DPG3",name:"Polythene Disposable Glove",color:"Clear",size:"Free Size",material:"Polyethylene"},
  {cat:"Leather & Welding",code:"LWG1",name:"Tans Yellow Leather Glove",color:"Yellow/Tan",size:"Free Size",material:"Split Leather"},
  {cat:"Leather & Welding",code:"LWG2",name:"Grey Heavy Duty Leather Glove",color:"Gray",size:"Free Size",material:"Split Leather"},
  {cat:"Leather & Welding",code:"LWG3",name:"Red Welding Glove",color:"Red",size:"Free Size",material:"Split Leather"},
  {cat:"Leather & Welding",code:"LWG4",name:"Premium Heat Resistant Glove (Germany)",color:"Blue & Yellow",size:"Free Size",material:"Premium Leather"},
  {cat:"Head Protection",code:"SH1",name:"Safety Helmet Normal",color:"White/Yellow/Blue/Red/Orange",size:"Free Size",material:"HDPE/ABS"},
  {cat:"Head Protection",code:"SH2",name:"Ventilation Safety Helmet",color:"White/Yellow/Blue/Red",size:"Free Size",material:"ABS"},
  {cat:"Head Protection",code:"SH3",name:"Head Shield (Welding)",color:"Black",size:"Free Size",material:"Polycarbonate"},
  {cat:"Head Protection",code:"SH4",name:"Heat Resistant Face Shield",color:"Clear/Navy Blue",size:"Free Size",material:"Polycarbonate"},
  {cat:"Head Protection",code:"SH5",name:"Safety Helmet with Visor",color:"White/Yellow",size:"Free Size",material:"HDPE + Polycarbonate"},
  {cat:"Head Protection",code:"NC1",name:"Reusable Net Cap",color:"Black/White/Blue",size:"Free Size",material:"Nylon Mesh"},
  {cat:"Head Protection",code:"NC2",name:"Disposable Net Cap",color:"Blue/White",size:"Free Size",material:"Non-Woven"},
  {cat:"Ear Protection",code:"EP1",name:"Ear Muffs",color:"Black/Red",size:"Free Size",material:"ABS/Foam"},
  {cat:"Ear Protection",code:"EP2",name:"Ear Plugs (with Cord)",color:"Orange",size:"Free Size",material:"Silicon/PU Foam"},
  {cat:"Eye Protection",code:"EY1",name:"Safety Goggles",color:"Clear/Black",size:"Free Size",material:"Polycarbonate"},
  {cat:"Eye Protection",code:"EY2",name:"Safety Spectacles",color:"Clear/Black",size:"Free Size",material:"Polycarbonate"},
  {cat:"Eye Protection",code:"EY3",name:"Welding Goggles",color:"Green/Black",size:"Free Size",material:"Polycarbonate"},
  {cat:"Eye Protection",code:"EY4",name:"Face Shield & Visor",color:"Clear/Yellow",size:"Free Size",material:"Polycarbonate + ABS"},
  {cat:"Respiratory",code:"RP1",name:"Disposable Face Mask (3-Ply)",color:"Blue/White",size:"Free Size",material:"Non-Woven"},
  {cat:"Respiratory",code:"RP2",name:"KN95 Mask",color:"Black/White/Blue",size:"Free Size",material:"Non-Woven + Filter"},
  {cat:"Respiratory",code:"RP3",name:"Chemical Resistant Respirator",color:"Black/Yellow",size:"Free Size",material:"Rubber + Carbon Filter"},
  {cat:"Respiratory",code:"RP4",name:"Reusable Cloth Mask",color:"Green/Black/Blue",size:"Free Size",material:"Cotton/Polyester"},
  {cat:"Body Protection",code:"BP1",name:"Safety Vest",color:"Yellow/Orange",size:"S/M/L/XL",material:"Polyester + Reflective"},
  {cat:"Body Protection",code:"BP2",name:"Safety Coverall",color:"Navy Blue/Royal Blue",size:"S-XXL",material:"Polyester/Cotton"},
  {cat:"Body Protection",code:"BP3",name:"Rain Coat",color:"Yellow/Orange",size:"S/M/L/XL",material:"PVC/Polyester"},
  {cat:"Body Protection",code:"BP4",name:"Rain Suit (Jacket & Pants)",color:"Navy Blue/Green",size:"S/M/L/XL",material:"PVC/Nylon"},
  {cat:"Body Protection",code:"BP5",name:"Apron",color:"Navy Blue/Black/Green",size:"Free Size",material:"PVC/Leather/Cotton"},
  {cat:"Body Protection",code:"BP6",name:"Safety Belt & Harness",color:"Orange/Blue",size:"Free Size",material:"Nylon/Polyester"},
  {cat:"Foot & Leg",code:"FL1",name:"Safety Shoes",color:"Black",size:"38-46",material:"Leather + Steel Toe"},
  {cat:"Foot & Leg",code:"FL2",name:"Safety Gum Boots",color:"Yellow/Black/Green",size:"38-46",material:"PVC/Rubber"},
  {cat:"Foot & Leg",code:"FL3",name:"Paddy Field Boots",color:"Navy Blue/Green",size:"38-46",material:"Rubber/PVC"},
  {cat:"Foot & Leg",code:"FL4",name:"Leather Leg Guards",color:"Gray/Brown",size:"Free Size",material:"Split Leather"},
  {cat:"Foot & Leg",code:"FL5",name:"Disposable Shoe Covers",color:"Blue/White",size:"Free Size",material:"Non-Woven/PE"}
];

let cart = {};
let activeCat = "Cotton Gloves";
const cats = [...new Set(PRODUCTS.map(p=>p.cat))];

function genQNo(){return 'QT-'+Date.now().toString().slice(-6);}
let currentQNo = genQNo();
document.getElementById('qno-display').textContent = currentQNo;
document.getElementById('quote-date').value = new Date().toISOString().split('T')[0];

function initTabs(){
  document.getElementById('cat-tabs').innerHTML = cats.map(c=>
    `<span class="cat-tab${c===activeCat?' active':''}" onclick="selectCat('${c}')">${c}</span>`
  ).join('');
}

function selectCat(cat){
  activeCat=cat;
  document.querySelectorAll('.cat-tab').forEach(t=>t.classList.toggle('active',t.textContent===cat));
  renderProducts();
}

function renderProducts(){
  document.getElementById('prod-grid').innerHTML = PRODUCTS.filter(p=>p.cat===activeCat).map(p=>{
    const sel=cart[p.code];
    const imgSrc=PRODUCT_IMAGES[p.code]||'';
    return `<div class="prod-card${sel?' selected':''}" id="pc-${p.code}" onclick="toggleProduct('${p.code}')">
      ${imgSrc?`<img src="${imgSrc}" class="prod-img" alt="${p.name}">`:
        `<div class="prod-img" style="display:flex;align-items:center;justify-content:center;font-size:22px;color:#ccc">🧤</div>`}
      <div class="prod-code">${p.code}</div>
      <div class="prod-name">${p.name}</div>
      <div class="prod-meta" style="font-size:10px;color:#aaa">${p.color} &middot; ${p.size}</div>
      ${sel?`<div class="prod-inputs" onclick="event.stopPropagation()">
        <div><label>Unit Price (LKR) — <strong>${sel.unit}</strong></label><input type="number" min="0" step="0.01" value="${sel.price}" onchange="updatePrice('${p.code}',this.value)"></div>
      </div>`:''}
    </div>`;
  }).join('');
}

function getDefaultUnit(code){
  const p=PRODUCTS.find(x=>x.code===code);
  const pairCats=["Cotton Gloves","Dotted Gloves","Nylon Gloves","Rubber/Latex Coated","Nitrile & PVC","Cut Resistant","Rubber & Household","Disposable Gloves","Leather & Welding"];
  const pairKeywords=["Glove","Boot","Shoe"];
  if(pairCats.includes(p.cat)) return 'PAIR';
  if(pairKeywords.some(k=>p.name.includes(k))) return 'PAIR';
  return 'EACH';
}

function toggleProduct(code){
  if(cart[code]){delete cart[code];}
  else{cart[code]={price:0,unit:getDefaultUnit(code)};}
  renderProducts();renderQuote();
}

function updatePrice(code,val){if(cart[code])cart[code].price=parseFloat(val)||0;renderQuote();}
function updateUnit(code,val){if(cart[code])cart[code].unit=val;renderQuote();}
function removeItem(code){delete cart[code];renderProducts();renderQuote();}

function renderQuote(){
  const items=Object.keys(cart);
  if(!items.length){
    document.getElementById('quote-body').innerHTML='<div class="empty-msg">Click on product cards to add items</div>';
    return;
  }
  const rows=items.map(code=>{
    const p=PRODUCTS.find(x=>x.code===code);
    const item=cart[code];
    return `<tr>
      <td>${p.code}</td>
      <td>${p.name}</td>
      <td style="text-align:center">${item.unit}</td>
      <td style="text-align:right">${item.price.toFixed(2)}</td>
      <td style="text-align:center"><button class="remove-btn" onclick="removeItem('${code}')">×</button></td>
    </tr>`;
  }).join('');
  document.getElementById('quote-body').innerHTML=`<table>
    <thead><tr><th>Code</th><th>Product</th><th style="text-align:center">Unit</th><th style="text-align:right">Unit Price (LKR)</th><th></th></tr></thead>
    <tbody>${rows}</tbody>
  </table>`;
}

async function submitQuote(){
  const name=document.getElementById('cust-name').value.trim();
  const date=document.getElementById('quote-date').value;
  const status=document.getElementById('status-msg');
  if(!name){status.className='status error';status.textContent='⚠ Please enter the customer name.';return;}
  if(!date){status.className='status error';status.textContent='⚠ Please select a date.';return;}
  if(!Object.keys(cart).length){status.className='status error';status.textContent='⚠ Please select at least one product.';return;}

  const btn=document.getElementById('submit-btn');
  btn.disabled=true;btn.textContent='Submitting...';status.style.display='none';

  const items=Object.keys(cart).map(code=>{
    const p=PRODUCTS.find(x=>x.code===code);
    const item=cart[code];
    return {code:p.code,name:p.name,category:p.cat,color:p.color,size:p.size,material:p.material,
      unit:item.unit,unitPrice:item.price};
  });

  const payload={
    quoteNo:currentQNo,
    date,
    customerName:name,
    customerCompany:document.getElementById('cust-company').value,
    customerAddress:document.getElementById('cust-addr').value,
    customerPhone:document.getElementById('cust-phone').value,
    customerEmail:document.getElementById('cust-email').value,
    note:document.getElementById('note').value,
    items,
    submittedAt:new Date().toISOString()
  };

  try{
    await fetch(WEBHOOK_URL,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)});
    status.className='status success';
    status.textContent='✓ Quotation '+currentQNo+' successfully submitted to Google Sheets!';
    currentQNo=genQNo();
    document.getElementById('qno-display').textContent=currentQNo;
    cart={};
    document.getElementById('cust-name').value='';
    document.getElementById('cust-company').value='';
    document.getElementById('cust-addr').value='';
    document.getElementById('cust-phone').value='';
    document.getElementById('cust-email').value='';
    document.getElementById('note').value='';
    renderProducts();renderQuote();
  }catch(e){
    status.className='status error';
    status.textContent='⚠ Submission failed: '+e.message;
  }

function printQuotation(){
  const name=document.getElementById('cust-name').value.trim();
  const company=document.getElementById('cust-company').value.trim();
  const addr=document.getElementById('cust-addr').value.trim();
  const phone=document.getElementById('cust-phone').value.trim();
  const email=document.getElementById('cust-email').value.trim();
  const date=document.getElementById('quote-date').value;
  const note=document.getElementById('note').value.trim();
  const items=Object.keys(cart);
  if(!items.length){alert('Please select at least one product first.');return;}

  const rows=items.map(code=>{
    const p=PRODUCTS.find(x=>x.code===code);
    const item=cart[code];
    const imgSrc=PRODUCT_IMAGES[code]||'';
    return `<tr>
      <td style="text-align:center;padding:6px">${imgSrc?`<img src="${imgSrc}" style="width:48px;height:48px;object-fit:contain">`:''}</td>
      <td style="padding:6px;font-size:11px;color:#c8a951;font-weight:bold">${p.code}</td>
      <td style="padding:6px;font-size:12px">${p.name}</td>
      <td style="padding:6px;font-size:11px;color:#555">${p.color}</td>
      <td style="padding:6px;font-size:11px;color:#555">${p.size}</td>
      <td style="padding:6px;font-size:12px;text-align:center">${item.unit}</td>
      <td style="padding:6px;font-size:12px;text-align:right">${item.price>0?'LKR '+item.price.toFixed(2):''}</td>
    </tr>`;
  }).join('');

  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html><head><meta charset="UTF-8">

    .info-label{color:#888;min-width:80px}
    .info-val{color:#222;font-weight:500}
    .qno{float:right;background:#fff8e6;border:1px solid #c8a951;color:#7a5c00;padding:4px 12px;border-radius:5px;font-size:12px;font-weight:bold}
    table{width:100%;border-collapse:collapse;margin-bottom:16px}
    th{background:#1a2744;color:#fff;padding:8px;text-align:left;font-size:11px}
    td{padding:4px 8px;border-bottom:1px solid #f0f2f5;vertical-align:middle}
    tr:nth-child(even) td{background:#fafbfc}

    <div class="info-row"><span class="info-label">Company</span><span class="info-val">${company||'—'}</span></div>
    <div class="info-row"><span class="info-label">Phone</span><span class="info-val">${phone||'—'}</span></div>
    <div class="info-row"><span class="info-label">Address</span><span class="info-val">${addr||'—'}</span></div>
    <div class="info-row"><span class="info-label">Email</span><span class="info-val">${email||'—'}</span></div>
  </div>

  <table>
    <thead><tr><th style="width:60px">Image</th><th style="width:60px">Code</th><th>Product Name</th><th>Color</th><th>Size</th><th style="width:60px;text-align:center">Unit</th><th style="width:100px;text-align:right">Unit Price</th></tr></thead>
    <tbody>${rows}</tbody>
  </table>

  ${note?`<div class="note"><strong>Note:</strong> ${note}</div>`:''}

  <div class="footer">
    All prices in LKR &middot; Thank you for choosing DM Trading House — your trusted partner for safety equipment.
  </div>
  <script>
    window.onload = function(){
      var imgs = document.images;
      var total = imgs.length;
      if (total === 0) { window.print(); return; }
      var loaded = 0;
      var done = false;
      function tryPrint(){
        if (done) return;
        done = true;
        window.print();
      }
      for (var i = 0; i < total; i++) {
        if (imgs[i].complete) {
          loaded++;
        } else {
          imgs[i].addEventListener('load', function(){ loaded++; if (loaded >= total) tryPrint(); });
          imgs[i].addEventListener('error', function(){ loaded++; if (loaded >= total) tryPrint(); });
        }
      }
      if (loaded >= total) {
        tryPrint();
      } else {
        // Safety net in case some image never fires load/error
        setTimeout(tryPrint, 1200);
      }
    };
  <\/script>
  </body></html>`);
  w.document.close();
}

</script>
